<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskPulse — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-bolt"></i></div>
      <span class="logo-text">TaskPulse</span>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Start managing your tasks</p>

    {% if error %}
    <div class="auth-error">
      <i class="fas fa-circle-xmark"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/register" class="auth-form">
      <div class="field">
        <label>Username <span class="req">*</span></label>
        <input type="text" name="username" placeholder="Choose a username (3+ chars)"
               autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label>
          Email
          <span class="auth-optional"> — used for due-date reminders</span>
        </label>
        <input type="email" name="email" placeholder="your@gmail.com"
               autocomplete="email" />
      </div>
      <div class="field">
        <label>Password <span class="req">*</span></label>
        <input type="password" name="password" placeholder="At least 6 characters"
               autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm Password <span class="req">*</span></label>
        <input type="password" name="confirm" placeholder="Repeat your password"
               autocomplete="new-password" />
      </div>
      <button type="submit" class="btn primary auth-submit">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="/login">Sign in</a>
    </p>

  </div>
</div>

</body>
</html>
